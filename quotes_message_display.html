<!-- 1. 在 quotes.php 的 PHP 部分（session_start()之后）添加： -->
<?php
// 检查是否有成功或错误消息
$success_message = isset($_SESSION['success_message']) ? $_SESSION['success_message'] : '';
$error_message = isset($_SESSION['error_message']) ? $_SESSION['error_message'] : '';

// 显示后清除消息
if ($success_message) unset($_SESSION['success_message']);
if ($error_message) unset($_SESSION['error_message']);
?>

<!-- 2. 在 quotes.php 的 <style> 部分添加： -->
<style>
/* 消息提示样式 */
.alert {
    padding: 14px 20px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideDown 0.3s ease-out;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.alert-success {
    background: #f0fdf4;
    color: #15803d;
    border-left: 4px solid #22c55e;
}

.alert-error {
    background: #fef2f2;
    color: #991b1b;
    border-left: 4px solid #ef4444;
}

.alert-close {
    margin-left: auto;
    cursor: pointer;
    font-size: 18px;
    color: inherit;
    opacity: 0.6;
    transition: opacity 0.2s;
}

.alert-close:hover {
    opacity: 1;
}
</style>

<!-- 3. 在 quotes.php 的主内容区开始处（<main class="main-content">之后）添加： -->
<?php if ($success_message): ?>
    <div class="alert alert-success" id="successAlert">
        <span>✓</span>
        <span><?php echo htmlspecialchars($success_message); ?></span>
        <span class="alert-close" onclick="this.parentElement.remove()">×</span>
    </div>
<?php endif; ?>

<?php if ($error_message): ?>
    <div class="alert alert-error" id="errorAlert">
        <span>✗</span>
        <span><?php echo htmlspecialchars($error_message); ?></span>
        <span class="alert-close" onclick="this.parentElement.remove()">×</span>
    </div>
<?php endif; ?>

<!-- 4. 在 quotes.php 的 <script> 部分最后添加： -->
<script>
// 自动隐藏消息提示（3秒后）
document.addEventListener('DOMContentLoaded', function() {
    const successAlert = document.getElementById('successAlert');
    const errorAlert = document.getElementById('errorAlert');
    
    if (successAlert) {
        setTimeout(() => {
            successAlert.style.transition = 'opacity 0.5s';
            successAlert.style.opacity = '0';
            setTimeout(() => successAlert.remove(), 500);
        }, 3000);
    }
    
    if (errorAlert) {
        setTimeout(() => {
            errorAlert.style.transition = 'opacity 0.5s';
            errorAlert.style.opacity = '0';
            setTimeout(() => errorAlert.remove(), 500);
        }, 5000);
    }
});
</script>
